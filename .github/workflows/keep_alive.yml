name: Supabase Keep Alive

on:
  schedule:
    # Runs at 09:00 UTC every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows you to manually trigger it via GitHub UI to test it

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database Rest API
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"